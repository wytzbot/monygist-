<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><title>Business Guide | MonyGist</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>:root{--primary:#22c55e}body{font-family:'Inter';margin:0;line-height:1.8}.container{max-width:800px;margin:0 auto;padding:30px}.logo{font-family:'Anton';font-size:24px}.logo span{color:var(--primary)}h1{font-family:'Anton'}h2{color:var(--primary)}.btn{padding:14px 24px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;width:100%;margin:30px 0}</style>
</head><body>
<header style="padding:16px;border-bottom:1px solid #eee"><div class="container"><a href="categories.html" class="logo">Mony<span>GIST</span></a></div></header>
<div id="article" class="container"><p>Loading...</p></div>
<script src="data.js?v=15"></script>
<script>
const urlParams = new URLSearchParams(location.search);
const id = urlParams.get('id');
const b = BUSINESS_DATA.find(x=>x.id===id);

if(b){
document.getElementById('article').innerHTML = `
<h1>How to Start a ${b.name} in the US 2026: Complete Guide</h1>
<p><b>Startup Capital:</b> $${b.startup.US.toLocaleString()} | <b>Monthly Profit:</b> $${b.profit.US.toLocaleString()}</p>
<h2>1. Overview</h2><p>This is a data-driven business plan for ${b.name} based on US Census Bureau and SBA 2026 data.</p>
<h2>2. Startup Capital</h2><p>$${b.startup.US.toLocaleString()}</p>
<h2>3. Monthly Profit</h2><p>$${b.profit.US.toLocaleString()}</p>
<h2>4. Best US Locations</h2><p>${b.locations}</p>
<h2>5. Main Competitors</h2><p>${b.comp}</p>
<h2>6. How to Beat Competitors</h2><p>${b.beat}</p>
<h2>7. Risks & Limitations</h2><p>${b.limit}</p>
<h2>8. Mistake to Avoid</h2><p>${b.mistake}</p>
<h2>9. US Economic Impact</h2><p>This business contributes to the $25.5T US economy by creating jobs and paying local taxes. Source: SBA 2026</p>
<button class="btn" onclick="alert('PDF Download coming soon')">📥 Save & Download PDF</button>
`;
} else {
  document.getElementById('article').innerHTML = "<h1>Business Not Found</h1><p>Go back to <a href='categories.html'>Categories</a></p>"
}
</script>
</body></html>
