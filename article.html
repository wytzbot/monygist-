<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Business Guide | MonyGist</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#22c55e;--bg:#fff;--text:#111827;--card:#fff;--border:#e5e7eb}
*{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.8}
.container{max-width:1200px;margin:0 auto;padding:20px}.article{max-width:800px;margin:0 auto;padding:60px 20px}
.article h1{font-family:'Anton';font-size:42px}.article h2{color:var(--primary);margin-top:40px;font-size:28px}
.btn{padding:14px 28px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
#emailPopup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center}
.popup{background:var(--card);padding:40px;border-radius:16px;max-width:420px}
footer{background:#111827;color:#d1d5db;padding:60px 20px;margin-top:80px}
</style>
</head><body>
<header style="padding:20px;border-bottom:1px solid var(--border)"><div class="container"><a href="categories.html" class="logo">Mony<span style="color:var(--primary)">GIST</span></a></div></header>
<div id="article" class="article"></div>
<div style="text-align:center;margin:40px"><a href="tools.html" class="btn">🚀 Ready to Launch? Use Our AI Tools Now</a></div>

<div id="emailPopup"><div class="popup"><h2>Save as PDF</h2><input id="email" type="email" placeholder="you@email.com" style="padding:12px;width:100%;margin:10px 0"><button class="btn" onclick="downloadPDF()" style="width:100%">Download</button></div></div>

<script>
const businesses = [{"id":"pos","name":"POS Business","cat":"Finance","summary":"Earn on transfers and bill payments","startup":{"US":2000,"UK":1800,"CA":2500,"NG":350000},"profit":{"US":800,"UK":700,"CA":900,"NG":150000},"comp":"Banks and Fintechs","beat":"Offer 24/7 service and lower charges","limit":"Network downtime and cash float","mistake":"Not keeping enough cash"},{"id":"coffee","name":"Coffee Shop","cat":"Food","summary":"$8k-$15k/month specialty coffee","startup":{"US":50000,"UK":40000,"CA":65000,"NG":8000000},"profit":{"US":10000,"UK":8000,"CA":12000,"NG":1500000},"comp":"Starbucks, Local cafes","beat":"Build loyalty app and unique drinks","limit":"High rent and staff costs","mistake":"Buying too much equipment upfront"},{"id":"laundry","name":"Laundry Service","cat":"Service","summary":"Recurring weekly customers","startup":{"US":15000,"UK":12000,"CA":18000,"NG":2500000},"profit":{"US":3500,"UK":3000,"CA":4000,"NG":600000},"comp":"Dry cleaners","beat":"24hr pickup and delivery","limit":"Power and water costs","mistake":"Underpricing services"},{"id":"agency","name":"Marketing Agency","cat":"Online","summary":"$500-$5000 per client monthly","startup":{"US":1000,"UK":800,"CA":1200,"NG":200000},"profit":{"US":6000,"UK":5000,"CA":7000,"NG":1000000},"comp":"Freelancers on Upwork","beat":"Guarantee 3x ROI in 90 days","limit":"Client retention","mistake":"Taking any client"},{"id":"gym","name":"Boutique Gym","cat":"Health","summary":"$99/month memberships","startup":{"US":100000,"UK":80000,"CA":120000,"NG":15000000},"profit":{"US":18000,"UK":14000,"CA":20000,"NG":3500000},"comp":"Planet Fitness","beat":"Group classes and community","limit":"Expensive equipment","mistake":"Signing 5yr lease too early"}];
let country = localStorage.getItem('country') || 'US';
function format(n){const s={US:'$',UK:'£',CA:'C$',NG:'₦'}; return s[country]+Number(n).toLocaleString();}
const id = new URLSearchParams(location.search).get('id');
const b = businesses.find(x=>x.id===id);
article.innerHTML = `
<h1>How to Start a ${b.name} in ${country} 2026: Complete Guide</h1>
<p><b>Startup Capital:</b> ${format(b.startup[country])} | <b>Monthly Profit:</b> ${format(b.profit[country])}</p>
<h2>1. Overview</h2><p>${b.summary}. This business model works in ${country} because demand is high and startup cost is manageable. ${b.summary}. The market is expected to grow 15% in 2026.</p>
<h2>2. Startup Costs Breakdown</h2><p>Equipment: ${format(b.startup[country]*0.4)}. Rent: ${format(b.startup[country]*0.3)}. Marketing: ${format(b.startup[country]*0.2)}. Licenses: ${format(b.startup[country]*0.1)}.</p>
<h2>3. Competitors</h2><p>Main competitors: ${b.comp}. They are strong but have gaps in customer service.</p>
<h2>4. Limitations & Risks</h2><p>${b.limit}. You must plan for these before starting.</p>
<h2>5. #1 Mistake to Avoid</h2><p>${b.mistake}. 90% of new businesses fail because of this.</p>
<h2>6. How to Beat Competitors</h2><p>${b.beat}. Focus on this in your first 90 days.</p>
<h2>7. 90-Day Launch Plan</h2><p>Week 1-4: Setup and registration. Week 5-8: Marketing and first customers. Week 9-12: Scale to ${format(b.profit[country])}/mo</p>
<button class="btn" onclick="window.pdfData='${b.name} Business Plan'; document.getElementById('emailPopup').style.display='flex'">📥 Save & Download PDF</button>
`;
function downloadPDF(){const email=document.getElementById('email').value; if(!email.includes('@'))return alert('Invalid email'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([window.pdfData])); a.download='MonyGist-Plan.txt'; a.click(); document.getElementById('emailPopup').style.display='none';}
</script>
<footer><div class="container" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px">
<div><h3 style="font-family:'Anton';color:#fff">Mony<span style="color:#22c55e">GIST</span></h3></div>
<div><h4 style="color:#fff">Company</h4><a href="about.html" style="color:#9ca3af;text-decoration:none;display:block">About Us</a><a href="contact.html" style="color:#9ca3af;text-decoration:none;display:block">Contact</a></div>
<div><h4 style="color:#fff">Legal</h4><a href="privacy.html" style="color:#9ca3af;text-decoration:none;display:block">Privacy Policy</a><a href="terms.html" style="color:#9ca3af;text-decoration:none;display:block">Terms</a></div>
</div><div style="text-align:center;margin-top:40px">© 2026 MonyGist</div></footer>
</body></html>
