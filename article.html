<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Details - MonyGIST</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#22c55e;--bg:#f9fafb;--card:#fff;--dark:#111}
body{font-family:'Inter';background:var(--bg);margin:0;line-height:1.8;color:#374151}
header{padding:20px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
header a{color:var(--primary);text-decoration:none;font-weight:600}
.container{max-width:850px;margin:0 auto;padding:20px}
h1{font-family:'Anton';font-size:42px;margin:10px 0;color:var(--dark);letter-spacing:1px}
h2{font-size:26px;margin-top:35px;color:#111;font-weight:800;border-left:4px solid var(--primary);padding-left:12px}
.card{background:var(--card);padding:28px;border-radius:16px;margin:20px 0;box-shadow:0 4px 15px rgba(0,0,0,0.06)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:20px 0}
.stat{background:#f0fdf4;padding:18px;border-radius:12px;text-align:center;border:1px solid #dcfce7}
.stat-label{font-size:12px;color:#166534;font-weight:700;text-transform:uppercase}
.stat-value{font-size:22px;font-weight:800;color:#14532d;margin-top:4px}
.highlight{background:#fefce8;border-left:4px solid #eab308;padding:18px;border-radius:10px;margin:18px 0}
.warning{background:#fef2f2;border-left:4px solid #ef4444;padding:18px;border-radius:10px;margin:18px 0}
.btn{width:100%;padding:18px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:18px;margin-top:20px;cursor:pointer}
ul,ol{padding-left:22px}
li{margin-bottom:10px}
.badge{display:inline-block;background:#dcfce7;color:#166534;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-right:8px}
table{width:100%;border-collapse:collapse;margin:15px 0}
table td,table th{border:1px solid #e5e7eb;padding:10px;text-align:left}
table th{background:#f3f4f6;font-weight:700}
</style>
<script src="./data.js"></script>
</head><body>
<header><a href="index.html">← Back to MonyGIST</a></header>
<div class="container" id="biz-details"><h1>Loading...</h1></div>

<footer style="background:#111;color:#ccc;text-align:center;padding:40px 16px;margin-top:60px;font-size:14px">
  <div style="max-width:800px;margin:0 auto">
    <div style="font-family:Anton;font-size:24px;color:#fff;margin-bottom:12px">Mony<span style="color:#22c55e">GIST</span></div>
    <p>© 2026 MonyGIST. US Data Only. Not Financial Advice.</p>
  </div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const bizId = params.get('id');
const business = typeof BUSINESS_DATA !== 'undefined' ? BUSINESS_DATA.find(b => b.id === bizId) : null;
const div = document.getElementById('biz-details');

if(business){
  const annual = business.profit.US * 12;
  const roi = ((annual)/business.startup.US*100).toFixed(1);
  const payback = (business.startup.US / business.profit.US).toFixed(1);
  
  div.innerHTML = `
    <span class="badge">USA 2026 DATA</span>
    <span class="badge">Category: ${business.cat}</span>
    <h1>${business.name}</h1>
    <p style="color:#666;font-size:18px">The complete 2026 breakdown: costs, profits, risks, and exact steps to hit $${business.profit.US.toLocaleString()}/month</p>

    <!-- SECTION 1: KEY STATS -->
    <div class="card">
      <h2>💰 Section 1: The Numbers & Startup Cost</h2>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Startup Cost</div><div class="stat-value">$${business.startup.US.toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">Monthly Profit</div><div class="stat-value">$${business.profit.US.toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">Annual Profit</div><div class="stat-value">$${annual.toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">Payback Period</div><div class="stat-value">${payback} Months</div></div>
      </div>
      <p><b>Detailed Startup Breakdown:</b> The $${business.startup.US.toLocaleString()} startup cost for a ${business.name} typically covers: Equipment and initial inventory 40%, Legal + Insurance + Licenses 20%, Marketing and Website 20%, Working Capital for first 3 months 20%. You can start smaller by doing a "MVP" version at 50% of this cost, but it will take 2x longer to reach $${business.profit.US.toLocaleString()}/month.</p>
      <div class="highlight"><b>Pro Tip:</b> Don't spend all $${business.startup.US.toLocaleString()} on day 1. Spend 30% to test, then reinvest profits. This cuts your risk in half.</div>
    </div>

    <!-- SECTION 2: PROFIT POTENTIAL -->
    <div class="card">
      <h2>📈 Section 2: Profit Potential & Revenue Model</h2>
      <p>The average ${business.name} makes $${business.profit.US.toLocaleString()} per month. Here's how that breaks down:</p>
      <table>
        <tr><th>Revenue Stream</th><th>% of Income</th><th>Monthly $</th></tr>
        <tr><td>Core Service/Product</td><td>70%</td><td>$${(business.profit.US*0.7).toLocaleString()}</td></tr>
        <tr><td>Upsells & Add-ons</td><td>20%</td><td>$${(business.profit.US*0.2).toLocaleString()}</td></tr>
        <tr><td>Recurring/Retainers</td><td>10%</td><td>$${(business.profit.US*0.1).toLocaleString()}</td></tr>
      </table>
      <p>To reach $${business.profit.US.toLocaleString()}/month you need roughly ${Math.ceil(business.profit.US/500)} customers paying $500/mo, or ${Math.ceil(business.profit.US/50)} customers paying $50/mo. Most businesses in this niche hit profitability in ${payback} months because of low overhead.</p>
    </div>

    <!-- SECTION 3: LIMITATIONS -->
    <div class="card">
      <h2>⚠️ Section 3: Limitations & Challenges in 2026</h2>
      <p><b>Biggest Limitation:</b> ${business.limit}</p>
      <p>Beyond that, 3 other challenges you will face:</p>
      <ol>
        <li><b>Customer Acquisition Cost:</b> Getting your first 10 customers will be the hardest and most expensive part.</li>
        <li><b>Competition:</b> Because this is profitable, new competitors enter every 3-6 months.</li>
        <li><b>Time to Scale:</b> You cannot go from $0 to $${business.profit.US.toLocaleString()} in 30 days. Expect 6-12 months of consistent work.</li>
      </ol>
      <div class="warning"><b>Reality Check:</b> 42% of businesses fail because they underestimate the limitation above. Plan for it now.</div>
    </div>

    <!-- SECTION 4: BEST LOCATIONS -->
    <div class="card">
      <h2>📍 Section 4: Best Locations in USA</h2>
      <p><b>Top Markets:</b> ${business.locations}</p>
      <p>Why these locations? They have the highest demand + lowest competition + highest average income for ${business.cat} services. </p>
      <p>If you cannot operate in these states, run this business 100% online. 68% of ${business.name} businesses in 2026 are fully remote and still hit $${business.profit.US.toLocaleString()}/mo.</p>
    </div>

    <!-- SECTION 5: COMPETITORS -->
    <div class="card">
      <h2>🥊 Section 5: Competitors Strategy Analysis</h2>
      <p><b>Current Competitors Do This:</b> ${business.comp}</p>
      <p>Most competitors in this space make 3 mistakes: 1. They charge too much and ignore small customers. 2. They have terrible customer service and slow response times. 3. They use outdated marketing like flyers and cold calls instead of TikTok/SEO/AI.</p>
    </div>

    <!-- SECTION 6: HOW TO BEAT COMPETITORS -->
    <div class="card">
      <h2>🎯 Section 6: How to Beat Competitors</h2>
      <p><b>Your Winning Strategy:</b> ${business.beat}</p>
      <p>Here’s exactly how to execute it:</p>
      <ol>
        <li><b>Be 10x Faster:</b> Respond to leads in under 5 minutes. Competitors take 24hrs.</li>
        <li><b>Be Cheaper to Start:</b> Offer a $99 trial or "first month free" to remove friction.</li>
        <li><b>Be More Specific:</b> Instead of "general ${business.cat}", become "The ${business.cat} for [niche]".</li>
        <li><b>Use AI:</b> Automate 80% of admin work so you can undercut competitor pricing by 20% and still profit more.</li>
      </ol>
    </div>

    <!-- SECTION 7: POSSIBLE LOSS -->
    <div class="card">
      <h2>📉 Section 7: Possible Loss and Reasons</h2>
      <p>If you fail at ${business.name}, here’s where you will lose money:</p>
      <ul>
        <li><b>$${(business.startup.US*0.3).toLocaleString()} Lost:</b> Spending on ads before you have product-market fit.</li>
        <li><b>$${(business.startup.US*0.4).toLocaleString()} Lost:</b> Buying too much inventory/equipment upfront.</li>
        <li><b>$${(business.startup.US*0.3).toLocaleString()} Lost:</b> Hiring too early before you have consistent revenue.</li>
      </ul>
      <div class="warning"><b>Main Reason for Failure:</b> Running out of cash in month 3-4 because they didn’t hit $${business.profit.US.toLocaleString()} fast enough.</div>
    </div>

    <!-- SECTION 8: MISTAKES + HOW TO ESCAPE -->
    <div class="card">
      <h2>🧠 Section 8: Mistakes & How To Escape Them</h2>
      <p><b>Common Beginner Mistake:</b> ${business.mistake}</p>
      <p><b>How to Escape This Mistake:</b></p>
      <ol>
        <li><b>Step 1:</b> Before spending $1, get 3 paying customers manually. This proves demand.</li>
        <li><b>Step 2:</b> Track every dollar in a spreadsheet. If you spend >30% of startup on one thing, stop.</li>
        <li><b>Step 3:</b> Join 2 communities of people already doing ${business.name} and copy what works.</li>
        <li><b>Step 4:</b> Set a "kill date". If you don’t make $1000 in 90 days, pivot or stop.</li>
      </ol>
    </div>

    <!-- SECTION 9: MARKETING -->
    <div class="card">
      <h2>📢 Section 9: Best Promotional Strategy for 2026</h2>
      <p>To get to $${business.profit.US.toLocaleString()}/month, do these 4 things in order:</p>
      <ol>
        <li><b>TikTok + YouTube Shorts:</b> Post 3x per week showing behind-the-scenes of ${business.name}. This is free and brings 60% of leads in 2026.</li>
        <li><b>SEO Blog + Google Ads:</b> Target "[service] near me" keywords. 1 blog post per week = 100 leads/mo after 6 months.</li>
        <li><b>Partnerships:</b> Partner with 5 businesses that already serve your customer. Give them 20% commission.</li>
        <li><b>Email + SMS:</b> Collect emails from day 1. Send 1 valuable tip per week. This is what gets you to $${business.profit.US.toLocaleString()} consistently.</li>
      </ol>
      <div class="highlight"><b>90 Day Plan:</b> Days 1-30: Get 5 customers. Days 31-60: Get to $5k/mo. Days 61-90: Systemize and hit $${business.profit.US.toLocaleString()}/mo.</div>
    </div>

    <!-- SAFE LEAD FORM - ADDED HERE -->
    <div style="max-width:500px; margin:40px auto; padding:30px; background:#f8f9fa; border-radius:12px; text-align:center;">
      <h2 style="margin-bottom:10px;">Get 500 Free Business Emails</h2>
      <p style="margin-bottom:20px; color:#555;">Download the full list for <b id="bizName">${business.name}</b></p>
      
      <form id="leadForm">
        <input type="email" id="email" placeholder="Enter your best email" required 
          style="width:100%; padding:14px; margin-bottom:15px; border:2px solid #ddd; border-radius:8px; font-size:16px;">
        <button type="submit" 
          style="width:100%; padding:14px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer;">
          Get Free Email List
        </button>
      </form>
      <p style="font-size:12px; color:#888; margin-top:15px;">We respect your privacy. No spam.</p>
    </div>
  `; // <-- THIS WAS THE MISSING `;` THAT BROKE IT
} else {
  div.innerHTML = `<h1>Business Not Found</h1><p>The ID "${bizId}" doesn't exist in data.js. Check your BUSINESS_DATA array.</p>`;
}
</script>

<script>
  // 1. YOUR GOOGLE SCRIPT URL
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5s8yK_t8X9ElFEOASdvNVo8hrBomRp7ftBvRQzbS9OBggNGzXJwpaKe1dRY1jCko5/exec";
  // 2. WAIT FOR PAGE TO LOAD
  document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById('leadForm');
    if(form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const businessName = document.getElementById('bizName').innerText;
        
        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            email: email,
            business: businessName,
            source: window.location.href
          })
        });
        
        alert("✅ Got it! Email saved. Download starting...");
        form.reset();
      });
    }
  });
</script>
</body></html>
