<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Details - MonyGIST</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
</head>
<body>
<header><a href="index.html">← Back</a><h1 id="biz-name">Loading...</h1></header>

<div class="container" id="biz-details">
  <!-- Data will load here -->
</div>

<script>
// 1. Get ID from URL ?id=coffee-shop
const params = new URLSearchParams(window.location.search);
const bizId = params.get('id');

// 2. Find business in data.js
const business = BUSINESS_DATA.find(b => b.id === bizId);

if(business){
  document.getElementById('biz-name').innerText = business.name;
  
  document.getElementById('biz-details').innerHTML = `
    <div class="card">
      <h2>Category: ${business.cat}</h2>
      <p><b>Startup Cost:</b> $${business.startup.US.toLocaleString()}</p>
      <p><b>Monthly Profit:</b> $${business.profit.US.toLocaleString()}</p>
      <p><b>Competition:</b> ${business.comp}</p>
      <p><b>How to Beat Them:</b> ${business.beat}</p>
      <p><b>Biggest Limitation:</b> ${business.limit}</p>
      <p><b>Common Mistake:</b> ${business.mistake}</p>
      <p><b>Best Locations:</b> ${business.locations}</p>
    </div>
    <button onclick="generatePlan('${business.id}')">Generate AI Business Plan</button>
  `;
} else {
  document.getElementById('biz-details').innerHTML = "<h2>Business Not Found</h2>";
}

function generatePlan(id){
  alert("AI Business Plan for " + id + "\nComing Next - We will build this page")
}
</script>
</body>
</html>
