<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Business Guide | MonyGist</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#22c55e;--bg:#fff;--text:#111827;--card:#fff;--border:#e5e7eb}
*{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.7}
.container{max-width:1200px;margin:0 auto;padding:16px}
.navbar{padding:16px 0;border-bottom:1px solid var(--border)}
.logo{font-family:'Anton';font-size:24px;text-decoration:none;color:var(--text)}.logo span{color:var(--primary)}
.article{max-width:700px;margin:0 auto;padding:30px 16px}
.article h1{font-family:'Anton';font-size:28px;line-height:1.2;margin-bottom:16px}
.article h2{color:var(--primary);margin-top:32px;font-size:20px}
.article p{font-size:16px;margin:12px 0}
.btn{padding:14px 24px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;text-decoration:none;display:block;width:100%;text-align:center;margin:30px 0;font-size:16px}
#emailPopup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:999}
.popup{background:var(--card);padding:24px;border-radius:16px;width:90%;max-width:400px}
.input{padding:12px;width:100%;margin:10px 0;border:2px solid var(--border);border-radius:8px}
footer{background:#111827;color:#d1d5db;padding:40px 16px;margin-top:60px;font-size:14px}
@media (min-width: 768px){
.article{padding:60px 20px}
.article h1{font-size:42px}
.article h2{font-size:28px}
.btn{width:auto;display:inline-block}
}
</style>
</head><body>
<header class="navbar"><div class="container"><a href="categories.html" class="logo">Mony<span>GIST</span></a></div></header>

<div id="article" class="article"><p>Loading...</p></div>

<div style="text-align:center"><a href="tools.html" class="btn">🚀 Ready to Launch? Use Our AI Tools Now</a></div>

<div id="emailPopup"><div class="popup">
<h2 style="margin-top:0">Save as PDF</h2>
<p>Enter your email to download this business plan</p>
<input id="email" type="email" placeholder="you@email.com" class="input">
<button class="btn" onclick="downloadPDF()" style="margin:0">Download PDF</button>
<button onclick="document.getElementById('emailPopup').style.display='none'" style="background:none;border:none;margin-top:10px;width:100%">Cancel</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="data.js?v=12"></script>
<script>

let country = localStorage.getItem('country') || 'NG';
function format(n){const s={US:'$',UK:'£',CA:'C$',NG:'₦'}; return s[country]+Number(n).toLocaleString();}

const urlParams = new URLSearchParams(location.search);
const id = urlParams.get('id');
const b = BUSINESS_DATA.find(x=>x.id===id);

if(b){
document.getElementById('article').innerHTML = `
<h1>How to Start a ${b.name} in ${country} 2026: Complete Guide</h1>
<p><b>Startup Capital:</b> ${format(b.startup[country])} | <b>Monthly Profit:</b> ${format(b.profit[country])}</p>
<h2>1. Overview</h2><p>${b.summary}</p>
<h2>2. Startup Costs</h2><p>Total: ${format(b.startup[country])}</p>
<h2>3. Main Competitors</h2><p>${b.comp}</p>
<h2>4. Risks</h2><p>${b.limit}</p>
<h2>5. Mistake to Avoid</h2><p>${b.mistake}</p>
<h2>6. How to Win</h2><p>${b.beat}</p>
<button class="btn" onclick="document.getElementById('emailPopup').style.display='flex'">📥 Save & Download PDF</button>
`;
} else {
  document.getElementById('article').innerHTML = "<h1>Business Not Found</h1><p>Go back to <a href='categories.html'>Categories</a></p>"
}

async function downloadPDF(){
  const email=document.getElementById('email').value;
  if(!email.includes('@')) return alert('Please enter a valid email');
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFontSize(20);
  doc.setTextColor(34, 197, 94);
  doc.text("MonyGist Business Plan", 105, 20, {align: "center"});
  doc.setFontSize(16);
  doc.setTextColor(0,0,0);
  doc.text(`${b.name} - ${country} 2026`, 20, 35);
  doc.setFontSize(11);
  let y = 50;
  doc.text(`Startup Capital: ${format(b.startup[country])}`, 20, y);
  doc.text(`Monthly Profit: ${format(b.profit[country])}`, 20, y+10);
  doc.text(`Country: ${country}`, 20, y+20);
  doc.text(`Email: ${email}`, 20, y+30);
  y = y+45;
  doc.setFontSize(13);
  doc.setTextColor(34, 197, 94);
  doc.text("Overview", 20, y);
  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text(doc.splitTextToSize(b.summary, 170), 20, y+7);
  y = y+25;
  doc.setFontSize(13);
  doc.setTextColor(34, 197, 94);
  doc.text("Competitors", 20, y);
  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text(doc.splitTextToSize(b.comp, 170), 20, y+7);
  y = y+20;
  doc.setFontSize(13);
  doc.setTextColor(34, 197, 94);
  doc.text("How to Beat Competitors", 20, y);
  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text(doc.splitTextToSize(b.beat, 170), 20, y+7);
  y = y+25;
  doc.setFontSize(13);
  doc.setTextColor(34, 197, 94);
  doc.text("Risk & Mistake to Avoid", 20, y);
  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text(doc.splitTextToSize(b.mistake + ". " + b.limit, 170), 20, y+7);
  doc.setFontSize(8);
  doc.setTextColor(100);
  doc.text("Generated by MonyGist.com | Data from World Bank, Statista 2026", 105, 285, {align: "center"});
  doc.save(`MonyGist-${b.name}-Plan.pdf`);
  document.getElementById('emailPopup').style.display='none';
  alert('Professional PDF Downloaded!');
}
</script>
<footer><div class="container" style="display:grid;grid-template-columns:repeat(2,1fr);gap:20px">
<div><h3 style="font-family:'Anton';color:#fff;font-size:18px">Mony<span style="color:#22c55e">GIST</span></h3></div>
<div><h4 style="color:#fff">Legal</h4><a href="privacy.html" style="color:#9ca3af;text-decoration:none;display:block">Privacy</a><a href="terms.html" style="color:#9ca3af;text-decoration:none;display:block">Terms</a></div>
</div><div style="text-align:center;margin-top:20px">© 2026 MonyGist</div></footer>
</body></html>
