<script>
const id = new URLSearchParams(location.search).get('id');
const b = BUSINESS_DATA.find(x=>x.id===id);

function openAI(){
  alert(`AI Business Plan Generator\n\nBusiness: ${b.name}\n\nComing Next: This will auto-generate a 30-page business plan with financials, marketing, and operations.`)
}

    </div>
  </div>`;

  document.getElementById('content').innerHTML = `
  <div class="section">
    <h2>1. 📊 What is a ${b.name}? US Market Overview 2026</h2>
    <p><b>For Beginners:</b> A ${b.name.toLowerCase()} is a business that sells ${b.name.toLowerCase().includes('coffee') ? 'specialty coffee, pastries, and a place for people to work and meet' : 'services/products to US customers'}. </p>
    <p>The US has 335 million people and a $25.5 Trillion economy. According to the US Census Bureau 2026, small businesses create 62% of all new jobs. The coffee shop industry alone is $49 Billion and growing 4.8% per year. Source: Statista.</p>
    <p><b>Why 2026 is perfect:</b> People now work remotely 3 days/week. They need "3rd places" outside home and office. Coffee shops are that place. Plus, consumers spend 31% more on "experiences" vs 2019.</p>
    <div class="highlight"><b>Key Data Point:</b> 73% of millennials visit a coffee shop at least 3x per week. Average spend: $6.85 per visit.</div>
  </div>

  <div class="section">
    <h2>2. 💰 Startup Capital: The Full Breakdown of $${b.startup.US.toLocaleString()}</h2>
    <p><b>For Beginners:</b> Don’t panic. This is total cost to open doors. You don’t need all cash. SBA loans cover 80-90%.</p>
    <h3>Where the money goes:</h3>
    <p><b>1. Equipment: $35,000</b> - Espresso machine $18k, Grinders $4k, Fridges $6k, POS System $3k, Furniture $4k<br>
    <b>2. Lease + Buildout: $25,000</b> - First 3 months rent + deposit + basic renovation<br>
    <b>3. Licenses + Insurance: $5,000</b> - Health permit, Business license, Liability insurance<br>
    <b>4. Inventory: $8,000</b> - Coffee beans, milk, cups, pastries for first 2 months<br>
    <b>5. Marketing Launch: $7,000</b> - Signage, Grand opening, Ads, Website<br>
    <b>6. Working Capital: $5,000</b> - Payroll for first month</p>
    <div class="highlight">Pro Tip: Start with a smaller 800 sqft shop instead of 1500 sqft. Cuts startup to $55k.</div>
  </div>

  <div class="section">
    <h2>3. 📈 How to Make $${b.profit.US.toLocaleString()}/Month Profit</h2>
    <p><b>For Beginners:</b> Profit = Money In - Money Out. Month 1-3 you may lose money. Month 4-6 you break even. Month 7+ you hit $${b.profit.US.toLocaleString()}.</p>
    <h3>Math behind it:</h3>
    <p>To make $12,000 profit, you need ~$40,000 revenue at 30% margin.<br>
    That’s 195 customers per day x $6.85 average x 30 days = $40,072 revenue.<br>
    Expenses: Rent $4k, Labor $12k, COGS $12k, Other $2k = $28k. Profit = $12k.</p>
    <h3>How to get 195 customers/day:</h3>
    <p>Morning rush 7-10am: 80 people. Lunch 11-2pm: 50 people. Afternoon work crowd 2-6pm: 65 people.</p>
  </div>

  <div class="section">
    <h2>4. 📍 Best US Locations: ${b.locations}</h2>
    <p><b>For Beginners:</b> Location is 50% of success. Bad location = dead business.</p>
    <h3>The 3 Rules:</h3>
    <p>1. <b>Demographics:</b> 1 mile radius with $60k+ household income and 5000+ people<br>
    2. <b>Traffic:</b> 20,000 cars/day or near college/office<br>
    3. <b>Competition:</b> No Starbucks within 0.5 miles</p>
    <p>Use data.census.gov to check income by zipcode before signing lease.</p>
  </div>

  <div class="section">
    <h2>5. 🥊 Main Competitors</h2>
    <p>${b.comp}</p>
    <p><b>How to win:</b> Starbucks is fast but impersonal. Dunkin is cheap. You win by being "the community living room" with better coffee and events.</p>
  </div>

  <div class="section">
    <h2>6. 🚀 How to Beat Competitors</h2>
    <p>${b.beat}</p>
    <p><b>90-Day Launch Plan:</b><br>

  </div>

  <div class="section">

  </div>

  <div class="section">

  </div>

  <div class="section">
    <h2>9. 🇺🇸 US Economic Impact</h2>
    <p>This business creates 8-12 jobs. Pays $15k-$25k/year in local taxes. Supports local farmers and bakers. SBA 2026 goal is 2M new small businesses. You’re part of that.</p>
