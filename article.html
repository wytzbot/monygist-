<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Details - MonyGIST</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#22c55e;--bg:#f9fafb;--card:#fff}
body{font-family:'Inter';background:var(--bg);margin:0;padding:0}
header{padding:20px;background:#fff;border-bottom:1px solid #eee}
header a{color:var(--primary);text-decoration:none;font-weight:600;font-family:Inter}
.container{max-width:700px;margin:0 auto;padding:20px}
h1{font-family:'Anton';font-size:36px;margin:10px 0}
.card{background:var(--card);padding:20px;border-radius:16px;margin:15px 0;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
.stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f1f1;font-size:16px}
.stat b{color:var(--primary);font-weight:700}
.btn{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:18px;margin-top:20px;cursor:pointer}
</style>
<script src="data.js"></script>
</head><body>
<header><a href="index.html">← Back to MonyGIST</a></header>
<div class="container" id="biz-details"><h1>Loading...</h1></div>

<script>
const params = new URLSearchParams(window.location.search);
const bizId = params.get('id');
const business = BUSINESS_DATA.find(b => b.id === bizId);
const div = document.getElementById('biz-details');

if(business){
  const roi = ((business.profit.US*12)/business.startup.US*100).toFixed(1);
  div.innerHTML = `
    <h1>${business.name}</h1>
    <p style="color:#666">Category: ${business.cat}</p>
    <div class="card">
      <div class="stat"><span>Startup Cost</span><b>$${business.startup.US.toLocaleString()}</b></div>
      <div class="stat"><span>Monthly Profit</span><b>$${business.profit.US.toLocaleString()}</b></div>
      <div class="stat"><span>Annual Profit</span><b>$${(business.profit.US*12).toLocaleString()}</b></div>
      <div class="stat"><span>ROI</span><b>${roi}% / year</b></div>
    </div>
    <div class="card">
      <p><b>Competition:</b> ${business.comp}</p>
      <p><b>How to Beat Them:</b> ${business.beat}</p>
      <p><b>Biggest Limitation:</b> ${business.limit}</p>
      <p><b>Common Mistake:</b> ${business.mistake}</p>
      <p><b>Best Locations:</b> ${business.locations}</p>
    </div>
    <button class="btn" onclick="alert('AI Plan for ${business.name} - Coming Soon')">Generate AI Business Plan</button>
  `;
} else {
  div.innerHTML = `<h1>Business Not Found</h1><p>The ID "${bizId}" doesn't exist. Check data.js for typos.</p>`;
}
</script>
</body></html>
