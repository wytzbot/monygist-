<div class="container" id="biz-details"><h1>Loading...</h1></div>

<script>
const params = new URLSearchParams(window.location.search);
const bizId = params.get('id');
const business = BUSINESS_DATA.find(b => b.id === bizId);
const div = document.getElementById('biz-details');

if(business){
  const annual = business.profit.US * 12;
  const roi = ((annual)/business.startup.US*100).toFixed(1);
  const payback = (business.startup.US / business.profit.US).toFixed(1);
  
  div.innerHTML = `
    <h1>${business.name}</h1>
    <p style="color:#666;font-size:16px">Category: ${business.cat}</p>

    <div class="card">
      <h2>💰 The Numbers</h2>
      <div class="stat"><span>Startup Cost</span><b>$${business.startup.US.toLocaleString()}</b></div>
      <div class="stat"><span>Monthly Profit</span><b>$${business.profit.US.toLocaleString()}</b></div>
      <div class="stat"><span>Annual Profit</span><b>$${annual.toLocaleString()}</b></div>
      <div class="stat"><span>ROI</span><b>${roi}% per year</b></div>
      <div class="stat"><span>Payback Period</span><b>${payback} months</b></div>
      <div class="highlight">
        <b>What this means:</b> If you invest $${business.startup.US.toLocaleString()}, you can get your money back in ${payback} months. After that, it's $${business.profit.US.toLocaleString()} profit every month.
      </div>
    </div>

    <div class="card">
      <h2>📖 What Is This Business?</h2>
      <p>The <b>${business.name}</b> is in the ${business.cat} category. 
      This business works by ${business.beat.toLowerCase()}. 
      Your main customers will come from ${business.locations.toLowerCase()}.</p>
      <p>To succeed here, you need to focus on beating the competition: ${business.comp}.</p>
    </div>

    <div class="card">
      <h2>⚠️ Challenges to Know</h2>
      <p><b>Biggest Limitation:</b> ${business.limit}</p>
      <p><b>Common Mistake Beginners Make:</b> ${business.mistake}</p>
      <div class="highlight">
        <b>Pro Tip:</b> Avoid the mistake above by planning for it before you start. Most new businesses fail because of this.
      </div>
    </div>

    <div class="card">
      <h2>🚀 How to Get Started</h2>
      <ul>
        <li><b>Step 1:</b> Validate demand in ${business.locations}</li>
        <li><b>Step 2:</b> Budget $${business.startup.US.toLocaleString()} for startup costs</li>
        <li><b>Step 3:</b> Differentiate yourself by ${business.beat}</li>
        <li><b>Step 4:</b> Watch out for ${business.limit}</li>
        <li><b>Step 5:</b> Scale once you hit $${business.profit.US.toLocaleString()}/month consistently</li>
      </ul>
    </div>
    
    <button class="btn" onclick="alert('AI Business Plan Generator for ${business.name} is Coming Soon')">Generate Full 30-Page AI Business Plan</button>
    <a href="#" id="downloadPDF" style="display:block;background:#fff;color:#22c55e;border:2px solid #22c55e;text-align:center;padding:14px;border-radius:12px;font-weight:700;margin-top:12px;text-decoration:none">
  📄 Download PDF Guide
</a>
  `;
} else {
  div.innerHTML = `<h1>Business Not Found</h1><p>The ID "${bizId}" doesn't exist in data.js</p>`;
}
</script>

<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('downloadPDF');
  if (!btn) return; 

  btn.addEventListener('click', function(e) {
    e.preventDefault();
    btn.innerText = "⏳ Generating PDF...";

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');

    // 1. GET ALL DATA FROM PAGE
    const businessName = document.querySelector('h1')?.innerText || 'Business Report';
    
    // Grab all numbers + % + $ from the page
    const allNumbers = [...document.querySelectorAll('body *')]
     .map(el => el.innerText)
     .filter(txt => /(\$|\%|x|Days|Weeks)/i.test(txt)) // look for $ % x Days
     .slice(0,4); // take first 4

    const roi = allNumbers[0] || '3.8x';
    const startup = allNumbers[1] || '$2,000';
    const time = allNumbers[2] || '60 Days';
    const difficulty = allNumbers[3] || 'Medium';

    // 2. HEADER
    doc.setFillColor(34, 197, 94);
    doc.rect(0, 0, 210, 25, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('MonyGIST BUSINESS REPORT', 15, 16);
    
    // 3. CONTENT BOX
    doc.setTextColor(0,0,0);
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.text(businessName, 15, 35);
    
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100);
    doc.text('By Ilemobayo Tolulope | @MonyGist', 15, 42);

    // Metrics Table
    y = 55;
    doc.setFillColor(249, 250, 251);
    doc.roundedRect(15, y, 180, 40, 3, 3, 'F');

    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0);
    doc.text('ROI', 20, y+10);
    doc.text('STARTUP COST', 65, y+10);
    doc.text('TIME TO $10K', 115, y+10);
    doc.text('DIFFICULTY', 165, y+10);

    doc.setFontSize(14);
    doc.text(roi, 20, y+20);
    doc.text(startup, 65, y+20);
    doc.text(time, 115, y+20);
    doc.text(difficulty, 165, y+20);

    // 4. FOOTER
    doc.setFontSize(9);
    doc.setTextColor(150);
    doc.text('© 2026 MonyGIST.com - Data for 2026', 15, 287);

    doc.save(businessName.replace(/[^a-z0-9]/gi, '-') + '-Report.pdf');
    btn.innerText = "📄 Download PDF Report";
  });
});
</script>
