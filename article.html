<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Details - MonyGist</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5;line-height:1.6}
.header{background:#0a2540;color:#fff;padding:15px}
.header a{color:#fff;text-decoration:none}
.container{max-width:800px;margin:20px auto;padding:20px;background:#fff;border-radius:10px}
.box{background:#e8f5e9;padding:15px;border-radius:8px;margin:10px 0}
.label{font-weight:bold;color:#0a2540}
.warn{background:#fff3cd;padding:10px;border-left:4px solid #ffc107;margin:10px 0}
</style>
</head>
<body>
<div class="header"><a href="index.html">← Back Home</a></div>

<div class="container" id="content">Loading...</div>

<script src="data.js?v=3"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const country = 'NG';
const b = BUSINESS_DATA.find(x=>x.id==id);

if(b){
document.getElementById('content').innerHTML = `
  <h1>${b.name}</h1>
  <p>${b.summary}</p>
  
  <div class="box">
    <span class="label">Startup Capital:</span> ₦${b.startup[country].toLocaleString()}<br>
    <span class="label">Monthly Profit:</span> ₦${b.profit[country].toLocaleString()}
  </div>

  <h3>Competitors</h3>
  <p>${b.comp}</p>

  <h3>How to Beat Them</h3>
  <p>${b.beat}</p>

  <div class="warn">
    <h3>Nigerian Wahala to Expect</h3>
    <p>${b.limit}</p>
  </div>

  <h3>Biggest Mistake</h3>
  <p>${b.mistake}</p>

  <button onclick="alert('Tool coming soon!')" style="background:#00d26a;color:#fff;padding:12px 25px;border:none;border-radius:5px;cursor:pointer">Calculate My ROI</button>
`;
} else {
document.getElementById('content').innerHTML = "<h2>Business Not Found</h2>";
}
</script>
</body>
</html>
