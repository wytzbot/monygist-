<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>200 Business Ideas 2026 - MonyGIST</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./data.js"></script> <!-- MUST LOAD BEFORE SCRIPT -->
</head>
<body class="bg-gray-50">
  <header class="bg-white border-b sticky top-0 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-bold text-green-600">MonyGIST</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold text-gray-900">200 Profitable Business Ideas for USA 2026</h1>
      <p class="text-lg text-gray-600 mt-2">Click any idea to see full detailed report with costs, profit, and marketing plan</p>
    </div>

    <div id="loading" class="text-center text-gray-500">Loading 200 ideas...</div>
    <div id="businessGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const grid = document.getElementById('businessGrid');
  const loading = document.getElementById('loading');

  if(typeof businessData === 'undefined'){
    loading.innerHTML = "Error: data.js not loaded. Check file path";
    return;
  }

  loading.style.display = 'none';
  let html = '';

  Object.keys(businessData).forEach(id => {
    const biz = businessData[id];
    html += `
      <a href="./business.html?id=${id}" class="bg-white p-6 rounded-xl border hover:shadow-lg hover:border-green-500 transition block">
        <h3 class="text-xl font-bold text-gray-900 mb-2">${biz.name}</h3>
        <p class="text-gray-600 text-sm mb-4">${biz.subtitle}</p>
        <div class="flex justify-between text-sm">
          <span><strong>Cost:</strong> ${biz.startup}</span>
          <span><strong>Profit:</strong> ${biz.profit}</span>
        </div>
        <div class="mt-3 text-green-600 font-semibold text-sm">View Full Report →</div>
      </a>
    `;
  });

  grid.innerHTML = html;
});
</script>
</body>
</html>
