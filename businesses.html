<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Businesses - MonyGIST</title>
<style>
body{font-family:Inter;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px;display:flex;justify-content:space-between;cursor:pointer}
.profit{color:#22c55e;font-weight:700}
</style>
<script src="data.js"></script>
</head><body>
<a href="categories.html">← Back</a>
<h1 id="cat-title">Businesses</h1>
<div id="list"></div>

<script>
const params = new URLSearchParams(window.location.search);
const cat = params.get('cat');
document.getElementById('cat-title').innerText = cat + " Businesses";

const filtered = BUSINESS_DATA.filter(b => b.cat === cat);
const list = document.getElementById('list');

filtered.forEach(b => {
  list.innerHTML += `
  <a href="article.html?id=${b.id}" style="text-decoration:none;color:#111">
    <div class="card">
      <div><b>${b.name}</b></div>
      <div class="profit">$${b.profit.US.toLocaleString()}/mo</div>
    </div>
  </a>`;
});
</script>
</body></html>
