<!DOCTYPE html>
<html lang="en">
<head>
  <title>ROI Calculator | MonyGist</title>
  <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
  <header class="navbar"><div class="container"><a href="/" class="logo">Mony<span>Gist</span></a></div></header>
  <div class="container" style="padding:40px 20px;">
    <h1>ROI Calculator</h1>
    <input id="roiProfit" type="number" placeholder="Annual Profit">
    <input id="roiInvest" type="number" placeholder="Total Investment">
    <button class="btn btn-primary" onclick="roiCalc()">Calculate ROI</button>
    <h2 id="roiResult"></h2>
  </div>
  <script>
    function roiCalc(){
      let roi = ((+roiProfit.value / +roiInvest.value) * 100).toFixed(1);
      document.getElementById('roiResult').innerText = "ROI: " + roi + "% per year";
    }
  </script>
</body>
</html>
