<!DOCTYPE html>
<html lang="en">
<head>
  <title>SWOT Generator | MonyGist</title>
  <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
  <header class="navbar"><div class="container"><a href="/" class="logo">Mony<span>Gist</span></a></div></header>
  <div class="container" style="padding:40px 20px;">
    <h1>SWOT Analysis Generator</h1>
    <input placeholder="Strengths" id="s"><input placeholder="Weaknesses" id="w">
    <input placeholder="Opportunities" id="o"><input placeholder="Threats" id="t">
    <button class="btn btn-primary" onclick="saveSwot()">Save SWOT</button>
    <p>We saved it to your browser. Come back anytime to edit.</p>
  </div>
  <script>
    function saveSwot(){
      localStorage.setItem('swot', JSON.stringify({s:s.value,w:w.value,o:o.value,t:t.value}));
      alert('Saved!');
    }
  </script>
</body>
</html>
