<!DOCTYPE html>
<html lang="en">
<head>
  <title>Business Name Generator | MonyGist</title>
  <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
  <header class="navbar"><div class="container"><a href="/" class="logo">Mony<span>Gist</span></a></div></header>
  <div class="container" style="padding:40px 20px;">
    <h1>AI Business Name Generator</h1>
    <input id="keyword" type="text" placeholder="Enter keyword: coffee, fitness, etc">
    <button class="btn btn-primary" onclick="genName()">Generate 10 Names</button>
    <div id="names" class="grid" style="margin-top:20px;"></div>
  </div>
  <script>
    const suffixes = ['Co', 'Hub', 'Works', 'Pro', 'Studio', 'Labs', 'Group'];
    function genName(){
      let k = keyword.value;
      let html = '';
      for(let i=0; i<10; i++){
        let name = k + suffixes[Math.floor(Math.random()*suffixes.length)];
        html += `<div class="card">${name}.com</div>`;
      }
      names.innerHTML = html;
    }
  </script>
</body>
</html>
