<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonyGist - Real Business Ideas for Nigeria</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
.header{background:#0a2540;color:#fff;padding:20px;text-align:center}
.header h1{margin:0;color:#00d26a}
.container{max-width:1000px;margin:20px auto;padding:0 15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:#fff;padding:25px;border-radius:10px;text-align:center;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card:hover{border:2px solid #00d26a}
</style>
</head>
<body>
<div class="header">
  <h1>MonyGIST</h1>
  <p>Real Business Ideas with Real ₦ Capital</p>
</div>

<div class="container">
  <h2>Choose a Category</h2>
  <div class="grid" id="categories"></div>
</div>

<script src="data.js?v=3"></script>
<script>
const cats = [...new Set(BUSINESS_DATA.map(b=>b.cat))];
document.getElementById('categories').innerHTML = cats.map(cat=>`
  <div class="card" onclick="location.href='categories.html?cat=${cat}'">
    <h3>${cat}</h3>
    <p>${BUSINESS_DATA.filter(b=>b.cat==cat).length} Ideas</p>
  </div>
`).join('');
</script>
</body>
</html>
