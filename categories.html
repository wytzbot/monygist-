<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - MonyGIST</title>
<style>
body{margin:0;font-family:Arial;background:#f0fff4}
.header{background:#00d26a;color:#fff;padding:20px;text-align:center}
.header h1{margin:0}
.container{max-width:1000px;margin:20px auto;padding:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:#fff;padding:25px;border-radius:15px;text-align:center;cursor:pointer;border:2px solid #00d26a;transition:0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 5px 15px rgba(0,210,106,0.3)}
.error{color:red;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="header"><h1>Choose a Category</h1></div>
<div class="container"><div class="grid" id="categories"></div></div>

<script src="data.js?v=6"></script>
<script>
try{
  const cats = [...new Set(BUSINESS_DATA.map(b=>b.cat))];
  document.getElementById('categories').innerHTML = cats.map(cat=>`
    <div class="card" onclick="location.href='article.html?id=${BUSINESS_DATA.find(b=>b.cat==cat).id}'">
      <h2>${cat}</h2>
      <p>${BUSINESS_DATA.filter(b=>b.cat==cat).length} Business Ideas</p>
    </div>
  `).join('');
}catch(e){
  document.getElementById('categories').innerHTML = `<div class='error'>ERROR: data.js not loading. Check file</div>`
}
</script>
</body>
</html>
