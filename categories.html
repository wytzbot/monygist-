<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Businesses - MonyGist</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
.header{background:#0a2540;color:#fff;padding:15px}
.header a{color:#fff;text-decoration:none}
.container{max-width:1000px;margin:20px auto;padding:0 15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px}
.card{background:#fff;padding:20px;border-radius:10px;border-left:4px solid #00d26a;cursor:pointer}
.card:hover{box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.price{color:#00d26a;font-weight:bold;font-size:18px}
.capital{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="header"><a href="index.html">← Back Home</a></div>

<div class="container">
  <h2 id="title">Businesses</h2>
  <div class="grid" id="businesses"></div>
</div>

<script src="data.js?v=3"></script>
<script>
const params = new URLSearchParams(location.search);
const cat = params.get('cat');
const country = 'NG'; // Default to Nigeria

document.getElementById('title').innerText = `Businesses in ${cat}`;

const filtered = BUSINESS_DATA.filter(b=>b.cat==cat);
document.getElementById('businesses').innerHTML = filtered.map(b=>`
  <div class="card" onclick="location.href='article.html?id=${b.id}'">
    <h3>${b.name}</h3>
    <p class="capital">Capital: ₦${b.startup[country].toLocaleString()}</p>
    <p class="price">Profit: ₦${b.profit[country].toLocaleString()}/month</p>
    <p>${b.summary}</p>
  </div>
`).join('');
</script>
</body>
</html>
