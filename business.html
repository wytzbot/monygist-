<!DOCTYPE html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Businesses</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter&display=swap" rel="stylesheet">
<style>:root{--primary:#22c55e}body{font-family:'Inter';margin:0}.container{max-width:700px;margin:0 auto;padding:20px}h1{font-family:'Anton'}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin:12px 0;cursor:pointer}.card:hover{border-color:var(--primary)}.profit{color:var(--primary);font-weight:700}</style>
</head><body>
<div class="container">
<h1 id="title">Businesses</h1>
<div id="list">Loading...</div>
</div>
<script src="data.js?v=17"></script>
<script>
const cat = new URLSearchParams(location.search).get('cat');
document.getElementById('title').innerText = `Businesses in ${cat}`;
const filtered = BUSINESS_DATA.filter(b => b.cat === cat);
document.getElementById('list').innerHTML = filtered.map(b=>`
<div class="card" onclick="location='article.html?id=${b.id}'">
<h3>${b.name}</h3>
<div class="profit">$${b.profit.US.toLocaleString()}/month profit</div>
</div>`).join('');
</script></body></html>
