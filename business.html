<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Businesses | MonyGist US</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#16a34a;--bg:#f8fafc;--card:#fff;--text:#0f172a;--text-light:#64748b;--border:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter';background:var(--bg);color:var(--text)}
.navbar{background:#fff;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0}
.logo{font-family:'Anton';font-size:26px;color:#000;text-decoration:none}.logo .green{color:var(--primary)}
.container{max-width:680px;margin:0 auto;padding:24px 16px}
h1{font-family:'Anton';font-size:24px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;cursor:pointer;transition:0.2s}
.card:hover{border-color:var(--primary);box-shadow:0 6px 16px rgba(22,163,74,0.1)}
.card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.profit{color:var(--primary);font-weight:700;font-size:15px}
footer{background:#0f172a;color:#94a3b8;padding:32px 20px;text-align:center;margin-top:40px;font-size:13px}
</style></head><body>
<header class="navbar"><a href="index.html" class="logo">Mony<span class="green">GIST</span></a></header>
<div class="container"><h1 id="title">Businesses</h1><div id="list">Loading...</div></div>
<script src="data.js?v=20"></script>
<script>
const cat = new URLSearchParams(location.search).get('cat');
document.getElementById('title').innerText = `${cat} Businesses`;
const filtered = BUSINESS_DATA.filter(b => b.cat === cat);
document.getElementById('list').innerHTML = filtered.map(b=>`
<div class="card" onclick="location='article.html?id=${b.id}'">
<h3>${b.name}</h3>
<div class="profit">$${b.profit.US.toLocaleString()}/month profit</div>
</div>`).join('');
</script>
<footer>© 2026 MonyGist US</footer></body></html>
